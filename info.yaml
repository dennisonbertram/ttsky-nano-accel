# Tiny Tapeout project information
project:
  title:        "nano_accel-TT: streaming nano-LM accelerator"
  author:       "Dennison Bertram"
  discord:      ""
  description:  "Runs a char-level nano language model autoregressively, streaming INT4 weights from the QSPI PSRAM Pmod through a single MAC"
  language:     "Verilog"
  clock_hz:     47619047

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "4x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_dennisonbertram_nano_accel"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "qspi_ctrl.v"
    - "nano_tt_core.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "ACK (host consumes token)"
  ui[1]: "FREE_RUN (no handshake)"
  ui[2]: "SLOW_BOOT (QSPI latency 0 for header read)"
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "TOKEN0"
  uo[1]: "TOKEN1"
  uo[2]: "TOKEN2"
  uo[3]: "TOKEN3"
  uo[4]: "TOKEN4"
  uo[5]: "TOKEN5"
  uo[6]: "TOKEN6"
  uo[7]: "VALID"

  # Bidirectional pins
  uio[0]: "CS0 flash (held high)"
  uio[1]: "SD0"
  uio[2]: "SD1"
  uio[3]: "SCK"
  uio[4]: "SD2"
  uio[5]: "SD3"
  uio[6]: "CS1 PSRAM A"
  uio[7]: "CS2 PSRAM B (held high)"

# Do not change!
yaml_version: 6
